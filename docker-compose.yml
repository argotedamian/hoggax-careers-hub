services:
  # ============================================
  # Development - Hot reload
  # ============================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

  # ============================================
  # Production Build - Solo genera la imagen
  # ============================================
  build:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - .next-cache:/app/.next/cache
    environment:
      - NEXT_TELEMETRY_DISABLED=1

  # ============================================
  # Production - Server standalone
  # ============================================
  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped